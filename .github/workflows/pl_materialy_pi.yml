name: PL discovery

# Kampania PL — harmonogram jak DE GU (pon-pt discovery)
# Aktywny pipeline PL na GitHub Actions
on:
  schedule:
    - cron: "0 22 * * 1"
      timezone: Europe/Warsaw
    - cron: "0 20 * * 2"
      timezone: Europe/Warsaw
    - cron: "0 0 * * 4"
      timezone: Europe/Warsaw
    - cron: "0 1 * * 5"
      timezone: Europe/Warsaw
    - cron: "0 21 * * 5"
      timezone: Europe/Warsaw
  workflow_dispatch:
    inputs:
      discovery_phase:
        description: "Etap discovery: auto (dzien PL) | mon | tue | wed | thu | fri"
        required: false
        type: choice
        options:
          - auto
          - mon
          - tue
          - wed
          - thu
          - fri
        default: auto
      resume_artifact_run_id:
        description: "Wznow z konkretnego run ID (pl-materialy-wyniki-pi). Puste = wg fazy."
        required: false
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: pl-pipeline
  cancel-in-progress: false

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  SERPER_DAILY_LIMIT: "1000"
  CLAUDE_UNLIMITED: "1"
  SCRAPER_MAX_RUNTIME_SECONDS: "14400"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 310
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-scraper

      - name: Resolve artifact run (poniedzialek-piatek)
        id: prev_run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESUME_INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.resume_artifact_run_id || '' }}"
          if [ -n "$RESUME_INPUT" ]; then
            echo "run-id=$RESUME_INPUT" >> "$GITHUB_OUTPUT"
            echo "artifact-name=pl-materialy-wyniki-pi" >> "$GITHUB_OUTPUT"
            echo "resume=1" >> "$GITHUB_OUTPUT"
            echo "phase=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PHASE="${{ github.event_name == 'workflow_dispatch' && inputs.discovery_phase || 'auto' }}"
          if [ "$PHASE" = "auto" ]; then
            HOUR=$(TZ=Europe/Warsaw date +%H)
            DOW=$(TZ=Europe/Warsaw date +%u)
            case "${HOUR}:${DOW}" in
              22:1) PHASE=mon ;;
              20:2) PHASE=tue ;;
              00:4) PHASE=wed ;;
              01:5) PHASE=thu ;;
              21:5) PHASE=fri ;;
              *)
                case "$DOW" in
                  1) PHASE=mon ;;
                  2) PHASE=tue ;;
                  3) PHASE=wed ;;
                  4) PHASE=thu ;;
                  5) PHASE=fri ;;
                  *) PHASE=thu ;;
                esac
                ;;
            esac
          fi
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"

          if [ "$PHASE" = "mon" ]; then
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq '[.artifacts[] | select(.name=="pl-materialy-wyniki-fri" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
              echo "artifact-name=pl-materialy-wyniki-fri" >> "$GITHUB_OUTPUT"
              echo "resume=0" >> "$GITHUB_OUTPUT"
            fi
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq '[.artifacts[] | select(.name=="pl-materialy-wyniki-pi" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')
            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "::error::Brak pl-materialy-wyniki-pi — uruchom najpierw poniedzialek discovery (faza mon)"
              exit 1
            fi
            echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "artifact-name=pl-materialy-wyniki-pi" >> "$GITHUB_OUTPUT"
            echo "resume=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Download previous Wyniki (kumulacja cache + Excel)
        if: steps.prev_run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.prev_run.outputs.artifact-name || 'pl-materialy-wyniki-fri' }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.prev_run.outputs.run-id }}
          path: .

      - name: Discovery (serper-only, pon-pt)
        run: |
          ARGS="--run-config run_config/pl_materialy.json --serper-only-discovery --no-auto-email --rotate-wojewodztwo"
          if [ "${{ steps.prev_run.outputs.resume }}" = "1" ]; then
            ARGS="$ARGS --respect-cache"
          fi
          python pl_materialy_scraper.py $ARGS

      - name: Upload Wyniki artifact (discovery)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pl-materialy-wyniki-pi
          path: |
            Wyniki/
            wyslane/

      - name: Chain — niedziela backfill (piatek)
        if: success() && steps.prev_run.outputs.phase == 'fri'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/gha_chain_workflow.sh "PL niedziela backfill" \
            "artifact_run_id=${{ github.run_id }}"

      - name: Wznow po timeout
        if: cancelled() && steps.prev_run.outputs.phase != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PHASE="${{ steps.prev_run.outputs.phase }}"
          gh workflow run pl_materialy_pi.yml -R "$GITHUB_REPOSITORY" \
            -f discovery_phase="$PHASE" \
            -f resume_artifact_run_id="${{ github.run_id }}"
