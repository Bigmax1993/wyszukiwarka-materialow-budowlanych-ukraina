name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile core modules
        run: |
          python -m py_compile kanbud_bootstrap.py
          python -m py_compile campaign_data_paths.py
          python -m py_compile email_targeting.py
          python -m py_compile de_gu_bauunternehmen_scraper.py
          python -m py_compile de_gu_keywords.py
          python -m py_compile ua_materialy_scraper.py
          python -m py_compile ua_oblast_keywords.py
          python -m py_compile ua_materialy_inquiry_email_uk.py

      - name: Scraper smoke DE GU (--test)
        run: python de_gu_bauunternehmen_scraper.py --test

      - name: Scraper smoke UA materialy (--test)
        run: python ua_materialy_scraper.py --test

      - name: Regresja discovery GU i Claude
        run: |
          python -m unittest \
            tests.test_gu_discovery_regression \
            tests.test_claude_llm_campaign \
            tests.test_claude_contact_extract \
            tests.test_claude_unlimited \
            tests.test_website_full_crawl \
            tests.test_claude_client_retry \
            tests.test_claude_page_text \
            tests.test_discovery_run_state \
            -v

      - name: Regresja i testy UA (pytest + unittest)
        run: |
          python -m unittest tests.test_ua_materialy_regression -v
          python -m pytest \
            tests/test_ua_oblast_keywords.py \
            tests/test_ua_inquiry_email_uk.py \
            tests/test_ua_claude_inquiry_email.py \
            tests/test_ua_supplier_filter.py \
            tests/test_ua_materialy_integration.py \
            -q
