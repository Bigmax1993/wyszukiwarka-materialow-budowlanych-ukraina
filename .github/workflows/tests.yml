name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
      USE_GEMINI_REPLY_INTELLIGENCE: "0"
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile core modules
        run: |
          python -m py_compile kanbud_bootstrap.py
          python -m py_compile campaign_data_paths.py
          python -m py_compile email_targeting.py
          python -m py_compile de_gu_bauunternehmen_scraper.py
          python -m py_compile de_gu_keywords.py

      - name: Scraper smoke (--test)
        run: python de_gu_bauunternehmen_scraper.py --test

      - name: Regresja discovery GU
        run: python -m unittest tests.test_gu_discovery_regression -v
