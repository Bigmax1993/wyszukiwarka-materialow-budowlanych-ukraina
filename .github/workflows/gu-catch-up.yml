name: GU catch-up (po limicie Actions)

# Odtwarza pipeline po wyczerpaniu minut GHA lub pominiętych schedule.
# Uruchom ręcznie po odnowieniu limitu (1. dnia miesiąca lub po doładowaniu billing).

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Który krok odtworzyć"
        required: true
        type: choice
        options:
          - discovery-tue
          - wtorek-send
          - full-tue
        default: full-tue

permissions:
  actions: write
  contents: read

concurrency:
  group: gu-pipeline
  cancel-in-progress: false

jobs:
  catch-up:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wtorek send (najpierw — jak schedule 9:00)
        if: inputs.step == 'wtorek-send' || inputs.step == 'full-tue'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run de_gu_fri.yml -R "$GITHUB_REPOSITORY"
          echo "Uruchomiono GU wtorek send"

      - name: Discovery wtorek (kontynuacja z pi)
        if: inputs.step == 'discovery-tue' || inputs.step == 'full-tue'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run de_gu_pi.yml -R "$GITHUB_REPOSITORY" -f discovery_phase=tue
          echo "Uruchomiono GU discovery (faza tue)"
