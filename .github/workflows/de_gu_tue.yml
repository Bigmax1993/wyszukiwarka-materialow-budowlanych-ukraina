name: GU poniedzialek send

on:
  schedule:
    - cron: "0 9 * * 1"
      timezone: Europe/Warsaw
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Opcjonalnie run ID zrodla (np. prep z poniedzialku). Puste = najnowszy mon."
        required: false
        type: string
      artifact_name:
        description: "Nazwa artefaktu zrodla (domyslnie de-gu-wyniki-mon)"
        required: false
        type: string
        default: "de-gu-wyniki-mon"
      force_resend:
        description: Ponowna wysylka (ignoruj suppression i sent)
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Berlin
  DISABLE_SEND_WINDOW: "1"
  MFG_EMAIL_ATTACHMENT_PATH: ${{ github.workspace }}/assets/campaign/MFG_Referenzliste_Einzelhandel.pptx
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
  SMTP_HOST: ragakomputer.home.pl
  SMTP_PORT: "465"
  SMTP_SSL: "1"
  IMAP_HOST: ragakomputer.home.pl
  IMAP_PORT: "993"
  IMAP_SSL: "1"
  MAIL_ARCHIVE_IMAP: "1"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (zrodlo wynikow)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || '' }}"
          ARTIFACT="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_name || 'de-gu-wyniki-mon' }}"
          if [ -n "$FORCED" ]; then
            RUN_ID="$FORCED"
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-mon" and .expired==false) | .workflow_run.id' | head -1)
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Brak artefaktu (uruchom prep lub podaj artifact_run_id)"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Pobieram $ARTIFACT z run $RUN_ID"

      - name: Download cache from zrodlo
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact_run.outputs.artifact || 'de-gu-wyniki-mon' }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Pobierz aktualny PPTX ze Slides
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        run: |
          pip install -r requirements-drive.txt
          python scripts/export_mfg_slides_attachment.py

      - name: Send emails partia 1 (do 300/dzien, okno 8-18 Berlin)
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          ARGS="--send-emails-only --ignore-send-window"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_resend }}" = "true" ]; then
            ARGS="$ARGS --force-resend"
          fi
          python de_gu_bauunternehmen_scraper.py $ARGS

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-tue
          path: |
            Wyniki/
            wyslane/
