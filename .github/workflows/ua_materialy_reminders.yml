name: UA sync odpowiedzi i przypomnienia

# Kampania UA — IMAP + przypomnienia co 3 dni (firmy bez odpowiedzi)
on:
  schedule:
    # Dni 1, 4, 7, … miesiąca o 10:00 (Europe/Warsaw) ≈ co 3 dni
    - cron: "0 10 1,4,7,10,13,16,19,22,25,28 * *"
      timezone: Europe/Warsaw
  workflow_dispatch:
    inputs:
      send_reminders:
        description: Wyślij przypomnienia (domyślnie tylko skan + podgląd)
        type: boolean
        default: true
      artifact_name:
        description: Artefakt źródłowy cache (domyślnie najnowszy reminders)
        required: false
        type: string
        default: "ua-materialy-wyniki-reminders"

permissions:
  actions: read
  contents: read

concurrency:
  group: ua-pipeline
  cancel-in-progress: false

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
  MAIL_ARCHIVE_IMAP: "1"
  MAIL_IMAP_ARCHIVE_FOLDER: wyslane
  USE_CLAUDE_REPLY_INTELLIGENCE: "1"
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID_UA }}
  GDRIVE_VERSION_XLSX: "0"
  GDRIVE_APPEND_XLSX: "1"
  UA_REGIONAL_INQUIRY_EMAIL_FROM: "2026-07-13"

jobs:
  sync-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-scraper

      - name: Resolve artifact run
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          resolve_run_id() {
            local artifact_name="$1"
            gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select(.name==\"${artifact_name}\" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty"
          }
          PREFERRED="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_name || 'ua-materialy-wyniki-reminders' }}"
          RUN_ID=$(resolve_run_id "$PREFERRED")
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            for NAME in ua-materialy-wyniki-reminders ua-materialy-wyniki-tue ua-materialy-wyniki-mon ua-materialy-wyniki-fri ua-materialy-wyniki-thu ua-materialy-wyniki-pi; do
              RUN_ID=$(resolve_run_id "$NAME")
              if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
                PREFERRED="$NAME"
                break
              fi
            done
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Brak artefaktu cache UA (fri/tue/mon/...)"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact=$PREFERRED" >> "$GITHUB_OUTPUT"

      - name: Download cache
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact_run.outputs.artifact }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Sync IMAP + przypomnienia UA
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_SENDER_NAME: ${{ secrets.MAIL_SENDER_NAME }}
        run: |
          ARGS="--min-days 3 --max-send 100"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.send_reminders }}" != "true" ]; then
            echo "Tylko skan IMAP (bez wysyłki przypomnień)."
          else
            ARGS="$ARGS --send"
          fi
          python ua_sync_replies_and_reminders.py $ARGS

      - name: Install Google Drive dependencies
        if: always()
        run: pip install -r requirements-drive.txt

      - name: Upload Wyniki + wyslane to Google Drive
        if: always()
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_IMPERSONATE_EMAIL: ${{ secrets.GDRIVE_IMPERSONATE_EMAIL }}
          GDRIVE_SHARED_DRIVE_ID: ${{ secrets.GDRIVE_SHARED_DRIVE_ID }}
        run: |
          mkdir -p Wyniki wyslane 2>/dev/null || true
          python scripts/gdrive_upload_wyniki.py --campaign-dir . --campaign ua

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ua-materialy-wyniki-reminders
          path: |
            Wyniki/
            wyslane/
