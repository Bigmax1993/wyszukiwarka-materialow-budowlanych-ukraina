name: GU niedziela backfill



on:

  schedule:

    - cron: "30 5 * * 0"
      timezone: Europe/Warsaw

  workflow_dispatch:

    inputs:

      artifact_run_id:

        description: "Opcjonalnie run ID piątku (de-gu-wyniki-pi). Puste = najnowszy pi."

        required: false

        type: string



permissions:

  actions: write

  contents: read



env:

  SCRAPER_TIMEZONE: Europe/Warsaw

  SERPER_DAILY_LIMIT: "1000"

  CLAUDE_UNLIMITED: "1"

  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs



jobs:

  backfill:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    env:

      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:

      - uses: actions/checkout@v4



      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      - run: |

          pip install -r requirements.txt

          python -m playwright install chromium --with-deps



      - name: Resolve artifact run (piatek, koniec discovery pon-pt)

        id: artifact_run

        env:

          GH_TOKEN: ${{ github.token }}

        run: |

          FORCED="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || '' }}"

          if [ -n "$FORCED" ]; then

            RUN_ID="$FORCED"

            ARTIFACT="de-gu-wyniki-pi"

          else

            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \

              --jq '[.artifacts[] | select(.name=="de-gu-wyniki-pi" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')

            ARTIFACT="de-gu-wyniki-pi"

          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then

            echo "::error::Brak artefaktu discovery (de-gu-wyniki-pi)"

            exit 1

          fi

          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

          echo "Pobieram $ARTIFACT z run $RUN_ID"



      - name: Download cache from discovery (piatek / de-gu-wyniki-pi)

        uses: actions/download-artifact@v4

        with:

          name: ${{ steps.artifact_run.outputs.artifact || 'de-gu-wyniki-pi' }}

          github-token: ${{ github.token }}

          run-id: ${{ steps.artifact_run.outputs.run-id }}

          path: .



      - name: Verify pending www + backfill and rebuild Excel

        run: |

          CFG="--run-config run_config/mfg_gu_de.json"

          python de_gu_bauunternehmen_scraper.py $CFG --verify-pending-contacts --reverify-all-contacts

          python de_gu_bauunternehmen_scraper.py $CFG --backfill-emails-from-cache

          python de_gu_bauunternehmen_scraper.py $CFG --rebuild-from-cache



      - name: Upload Wyniki artifact

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: de-gu-wyniki-thu

          path: |

            Wyniki/

            wyslane/

      - name: Chain — sync Google Drive
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/gha_chain_workflow.sh "Sync wyniki Google Drive"

