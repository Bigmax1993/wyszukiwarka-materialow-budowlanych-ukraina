name: GU niedziela backfill

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Opcjonalnie run ID wed (np. 27140798115). Puste = najnowszy wed."
        required: false
        type: string

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  SERPER_DAILY_LIMIT: "1500"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (sobota)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || '' }}"
          if [ -n "$FORCED" ]; then
            RUN_ID="$FORCED"
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-wed" and .expired==false) | .workflow_run.id' | head -1)
          fi
          if [ -z "$RUN_ID" ]; then
            echo "::error::Brak artefaktu de-gu-wyniki-wed (uruchom najpierw GU sobota discovery)"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Pobieram de-gu-wyniki-wed z run $RUN_ID"

      - name: Download cache from sobota
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-wed
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Verify pending www + backfill and rebuild Excel
        run: |
          python de_gu_bauunternehmen_scraper.py --verify-pending-contacts --reverify-all-contacts
          python de_gu_bauunternehmen_scraper.py --backfill-emails-from-cache
          python de_gu_bauunternehmen_scraper.py --rebuild-from-cache

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-thu
          path: |
            Wyniki/
            wyslane/
