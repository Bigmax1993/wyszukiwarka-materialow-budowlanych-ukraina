name: GU niedziela backfill

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Opcjonalnie run ID wed (np. 27140798115). Puste = najnowszy wed."
        required: false
        type: string

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  SERPER_DAILY_LIMIT: "3000"
  CLAUDE_UNLIMITED: "1"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (sobota)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || '' }}"
          if [ -n "$FORCED" ]; then
            RUN_ID="$FORCED"
            ARTIFACT="de-gu-wyniki-wed"
          else
            PICK=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '[.artifacts[] | select(.expired==false) | select(.name=="de-gu-wyniki-wed" or .name=="de-gu-wyniki-pi")] | sort_by(.created_at) | reverse | .[0] // empty')
            RUN_ID=$(echo "$PICK" | jq -r '.workflow_run.id // empty')
            ARTIFACT=$(echo "$PICK" | jq -r '.name // empty')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Brak artefaktu discovery (de-gu-wyniki-wed lub de-gu-wyniki-pi)"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Pobieram $ARTIFACT z run $RUN_ID"

      - name: Download cache from discovery (sobota lub piatek)
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact_run.outputs.artifact || 'de-gu-wyniki-wed' }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Verify pending www + backfill and rebuild Excel
        run: |
          CFG="--run-config run_config/mfg_gu_de.json"
          python de_gu_bauunternehmen_scraper.py $CFG --verify-pending-contacts --reverify-all-contacts
          python de_gu_bauunternehmen_scraper.py $CFG --backfill-emails-from-cache
          python de_gu_bauunternehmen_scraper.py $CFG --rebuild-from-cache

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-thu
          path: |
            Wyniki/
            wyslane/
