name: Copy GDRIVE secrets to PL

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GDRIVE OAuth secrets to PL repo
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          PL_REPO: Bigmax1993/wyszukiwarka-materialow-budowlanych-polska
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID_PL: ${{ secrets.GDRIVE_FOLDER_ID_PL }}
        run: |
          set -euo pipefail
          for name in GDRIVE_OAUTH_CLIENT_ID GDRIVE_OAUTH_CLIENT_SECRET GDRIVE_OAUTH_REFRESH_TOKEN GDRIVE_FOLDER_ID_PL; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "Brak wartosci dla $name w repo zrodlowym"
              exit 1
            fi
            printf '%s' "$val" | gh secret set "$name" -R "$PL_REPO"
            echo "OK: $name -> $PL_REPO"
          done
