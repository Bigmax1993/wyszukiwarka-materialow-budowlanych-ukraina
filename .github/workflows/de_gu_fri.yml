name: GU wtorek send

on:
  schedule:
    - cron: "0 9 * * 2"
      timezone: Europe/Warsaw
  workflow_dispatch:
    inputs:
      force_resend:
        description: Ponowna wysylka (ignoruj suppression i sent)
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: gu-pipeline
  cancel-in-progress: false

env:
  SCRAPER_TIMEZONE: Europe/Berlin
  DISABLE_SEND_WINDOW: "1"
  MFG_EMAIL_ATTACHMENT_PATH: ${{ github.workspace }}/assets/campaign/MFG_Referenzliste_Einzelhandel.pptx
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
  SMTP_HOST: ragakomputer.home.pl
  SMTP_PORT: "465"
  SMTP_SSL: "1"
  IMAP_HOST: ragakomputer.home.pl
  IMAP_PORT: "993"
  IMAP_SSL: "1"
  MAIL_ARCHIVE_IMAP: "1"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-scraper

      - name: Resolve artifact run (poniedzialek send)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name=="de-gu-wyniki-tue" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "::error::Brak artefaktu de-gu-wyniki-tue (uruchom najpierw GU poniedzialek send)"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Pobieram de-gu-wyniki-tue z run $RUN_ID"

      - name: Download cache from poniedzialek send
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-tue
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Pobierz aktualny PPTX ze Slides
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        run: |
          pip install -r requirements-drive.txt
          python scripts/export_mfg_slides_attachment.py

      - name: Send emails partia 2 (reszta backlogu, do 300/dzien)
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          ARGS="--send-emails-only --ignore-send-window"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_resend }}" = "true" ]; then
            ARGS="$ARGS --force-resend"
          fi
          python de_gu_bauunternehmen_scraper.py $ARGS

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-fri
          path: |
            Wyniki/
            wyslane/
