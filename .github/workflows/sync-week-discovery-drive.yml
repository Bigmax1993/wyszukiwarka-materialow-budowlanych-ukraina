name: Sync tygodnia discovery na Google Drive

on:
  workflow_dispatch:
    inputs:
      pi_run_ids:
        description: "Run ID de-gu-wyniki-pi (po przecinku). Domyslnie tydzien 15-21.06.2026 (bez srody - uszkodzony artefakt)."
        required: false
        default: "27533750486,27638016924,27713619204,27787280147,27837533068"
      week_label:
        description: "Etykieta w Excelu / logu"
        required: false
        default: "2026-06-15_2026-06-21"

permissions:
  actions: read
  contents: read

env:
  GDRIVE_FOLDER_ID: "1tP8oUi72t4EHDbE9GnHFdvfNtNsJe4xf"
  GDRIVE_VERSION_XLSX: "0"
  SCRAPER_TIMEZONE: Europe/Warsaw
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  sync-week:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -r requirements-drive.txt

      - name: Jeden Excel tygodnia na Drive (usun stare kopie)
        env:
          GH_TOKEN: ${{ github.token }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_IMPERSONATE_EMAIL: ${{ secrets.GDRIVE_IMPERSONATE_EMAIL }}
          GDRIVE_SHARED_DRIVE_ID: ${{ secrets.GDRIVE_SHARED_DRIVE_ID }}
          GDRIVE_VERSION_XLSX: "0"
        run: |
          mkdir -p Wyniki wyslane
          python scripts/sync_week_single_excel_gdrive.py \
            --run-ids "${{ github.event.inputs.pi_run_ids }}" \
            --week-label "${{ github.event.inputs.week_label }}"

      - name: Upload Wyniki artifact (tydzien, jeden Excel)
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-week-export
          path: |
            Wyniki/de_gu_bauunternehmen_kontakte_*.xlsx
