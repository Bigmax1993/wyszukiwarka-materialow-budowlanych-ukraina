# Jednorazowo: po środowym discovery — verify, Excel, wysyłka (bez zmiany harmonogramu tygodniowego).
# Uruchom ręcznie: Actions → GU jednorazowo Excel+send po sroda → Run workflow

name: GU jednorazowo Excel+send po sroda

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Run ID discovery (de-gu-wyniki-pi). Puste = najnowszy pi."
        required: false
        type: string
      force_resend:
        description: Ponowna wysylka (ignoruj suppression i sent)
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  SERPER_DAILY_LIMIT: "1000"
  CLAUDE_UNLIMITED: "1"
  MFG_EMAIL_ATTACHMENT_PATH: ${{ github.workspace }}/assets/campaign/MFG_Referenzliste_Einzelhandel.pptx
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
  SMTP_HOST: ragakomputer.home.pl
  SMTP_PORT: "465"
  SMTP_SSL: "1"
  IMAP_HOST: ragakomputer.home.pl
  IMAP_PORT: "993"
  IMAP_SSL: "1"
  MAIL_ARCHIVE_IMAP: "1"

jobs:
  excel_and_send:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (sroda discovery)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || '' }}"
          if [ -n "$FORCED" ]; then
            RUN_ID="$FORCED"
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-pi" and .expired==false) | .workflow_run.id' | head -1)
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Brak artefaktu de-gu-wyniki-pi (najpierw GU discovery — sroda)"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Pobieram de-gu-wyniki-pi z run $RUN_ID"

      - name: Download Wyniki z discovery
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-pi
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Verify www + backfill + rebuild Excel
        run: |
          CFG="--run-config run_config/mfg_gu_de.json"
          python de_gu_bauunternehmen_scraper.py $CFG --verify-pending-contacts --reverify-all-contacts
          python de_gu_bauunternehmen_scraper.py $CFG --backfill-emails-from-cache
          python de_gu_bauunternehmen_scraper.py $CFG --rebuild-from-cache
          ls -la Wyniki/*.xlsx || true

      - name: Pobierz aktualny PPTX ze Slides
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        run: |
          pip install -r requirements-drive.txt
          python scripts/export_mfg_slides_attachment.py

      - name: Wysylka maili partia 1 (do 300)
        run: |
          ARGS="--send-emails-only --ignore-send-window"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_resend }}" = "true" ]; then
            ARGS="$ARGS --force-resend"
          fi
          python de_gu_bauunternehmen_scraper.py $ARGS

      - name: Wysylka maili partia 2 (reszta backlogu)
        run: |
          ARGS="--send-emails-only --ignore-send-window"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_resend }}" = "true" ]; then
            ARGS="$ARGS --force-resend"
          fi
          python de_gu_bauunternehmen_scraper.py $ARGS

      - name: Upload Wyniki artifact (jednorazowy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-oneoff-wed
          path: |
            Wyniki/
            wyslane/
