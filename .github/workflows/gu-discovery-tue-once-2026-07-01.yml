name: GU discovery wtorek (jednorazowo 2026-07-01)

# Odtworzenie pominiętego discovery (faza wtorek) po resecie minut GHA.
# Schedule: 1 lipca 2026, 05:00 Europe/Warsaw — wykonuje się tylko raz (guard na rok).

on:
  schedule:
    - cron: "0 5 1 7 *"
      timezone: Europe/Warsaw
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: gu-pipeline
  cancel-in-progress: false

jobs:
  trigger-discovery-tue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Uruchom discovery wtorek (faza tue)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          YEAR=$(TZ=Europe/Warsaw date +%Y)
          TODAY=$(TZ=Europe/Warsaw date +%F)

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$YEAR" != "2026" ] || [ "$TODAY" != "2026-07-01" ]; then
              echo "Pomijam — jednorazowy cron tylko 2026-07-01 (dziś: $TODAY)"
              exit 0
            fi
            echo "Jednorazowy catch-up: discovery wtorek ($TODAY 05:00 Europe/Warsaw)"
          else
            echo "Ręczne uruchomienie discovery wtorek (workflow_dispatch)"
          fi

          gh workflow run de_gu_pi.yml -R "$GITHUB_REPOSITORY" -f discovery_phase=tue
          echo "Zlecono GU discovery z fazą tue"
