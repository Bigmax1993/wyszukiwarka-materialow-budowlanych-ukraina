name: Sync wyniki Google Drive

# Stała reguła kampanii GU:
# - Harmonogram: poniedziałek 06:00 Europe/Warsaw (cron + timezone).
# - Źródło danych: pierwszy dostępny artefakt thu → mon → tue → fri
#   (Excel po niedzielnym backfillu; NIE fri/tue z poprzedniej wysyłki).
# - Po backfillu: auto-chain do prep (cron pon 06:00 jako zapas).
# - Excel (.xlsx): kopia z datą + nadpisanie de_gu_bauunternehmen_kontakte.xlsx (aktualny).

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Opcjonalnie wymus artefakt (np. de-gu-wyniki-thu)"
        required: false
        type: string
  schedule:
    - cron: "0 6 * * 1"
      timezone: Europe/Warsaw

permissions:
  actions: write
  contents: read

env:
  GDRIVE_FOLDER_ID: "1tP8oUi72t4EHDbE9GnHFdvfNtNsJe4xf"
  GDRIVE_VERSION_XLSX: "1"
  SCRAPER_TIMEZONE: Europe/Warsaw
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -r requirements-drive.txt

      - name: Resolve artifact (najnowszy thu/mon/tue/fri)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED="${{ github.event.inputs.artifact_name }}"
          if [ -n "$FORCED" ]; then
            PICK=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq "[.artifacts[] | select(.expired==false) | select(.name==\"$FORCED\")] | sort_by(.created_at) | reverse | .[0] // empty")
          else
            PICK=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '[.artifacts[] | select(.expired==false) | select(.name=="de-gu-wyniki-thu" or .name=="de-gu-wyniki-mon" or .name=="de-gu-wyniki-tue" or .name=="de-gu-wyniki-fri")] | sort_by(.created_at) | reverse | .[0] // empty')
          fi
          ARTIFACT=$(echo "$PICK" | jq -r '.name // empty')
          RUN_ID=$(echo "$PICK" | jq -r '.workflow_run.id // empty')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::warning::Brak artefaktu (thu/mon/tue/fri) — upload tylko jesli Wyniki/ w repo"
            echo "artifact=" >> "$GITHUB_OUTPUT"
            echo "run-id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Pobieram $ARTIFACT z run $RUN_ID"

      - name: Download pipeline artifact
        if: steps.artifact_run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact_run.outputs.artifact }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Validate GDRIVE credentials
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
        run: |
          python -c "
          import os, json, sys
          refresh = (os.environ.get('GDRIVE_OAUTH_REFRESH_TOKEN') or '').strip()
          cid = (os.environ.get('GDRIVE_OAUTH_CLIENT_ID') or '').strip()
          csec = (os.environ.get('GDRIVE_OAUTH_CLIENT_SECRET') or '').strip()
          if refresh and cid and csec:
              print('OK: OAuth (upload na Moj dysk)')
              sys.exit(0)
          raw = (os.environ.get('GDRIVE_SERVICE_ACCOUNT_JSON') or '').strip()
          if not raw:
              print('BLAD: Ustaw OAuth (GDRIVE_OAUTH_*) LUB konto uslugowego + Shared Drive')
              print('PC: python scripts/gdrive_oauth_setup.py')
              sys.exit(1)
          if raw.startswith('AIza'):
              print('BLAD: GDRIVE_SERVICE_ACCOUNT_JSON to klucz API, nie JSON konta uslugowego')
              sys.exit(1)
          j = json.loads(raw)
          if j.get('type') != 'service_account':
              print('BLAD: niepoprawny JSON konta uslugowego')
              sys.exit(1)
          print('UWAGA: tylko konto uslugowego — upload wymaga Shared Drive (Workspace)')
          print('OK:', j.get('client_email'))
          "

      - name: Upload Wyniki to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_IMPERSONATE_EMAIL: ${{ secrets.GDRIVE_IMPERSONATE_EMAIL }}
          GDRIVE_SHARED_DRIVE_ID: ${{ secrets.GDRIVE_SHARED_DRIVE_ID }}
        run: |
          mkdir -p Wyniki wyslane 2>/dev/null || true
          python scripts/gdrive_upload_wyniki.py --campaign-dir .

      - name: Chain — poniedzialek prep
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/gha_chain_workflow.sh "GU poniedzialek prep"
