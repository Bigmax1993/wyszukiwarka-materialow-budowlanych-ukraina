name: Sync wyniki Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 5"
  workflow_run:
    workflows: ["GU piatek send"]
    types: [completed]

permissions:
  actions: read
  contents: read

env:
  GDRIVE_FOLDER_ID: "1tP8oUi72t4EHDbE9GnHFdvfNtNsJe4xf"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -r requirements-drive.txt

      - name: Resolve artifact run (piatek)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-fri" and .expired==false) | .workflow_run.id' | head -1)
          fi
          if [ -z "$RUN_ID" ]; then
            echo "::error::Brak artefaktu de-gu-wyniki-fri"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Pobieram de-gu-wyniki-fri z run $RUN_ID"

      - name: Download artifacts (piatek)
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-fri
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: Validate GDRIVE secret (JSON konta uslugowego)
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "
          import os, json, sys
          raw = (os.environ.get('GDRIVE_SERVICE_ACCOUNT_JSON') or '').strip()
          if not raw:
              print('PUSTY secret GDRIVE_SERVICE_ACCOUNT_JSON')
              sys.exit(1)
          if raw.startswith('AIza'):
              print('BLAD: wklejony klucz API (AIza...), nie plik JSON konta uslugowego')
              sys.exit(1)
          try:
              j = json.loads(raw)
          except json.JSONDecodeError as e:
              print('BLAD: niepoprawny JSON:', e)
              sys.exit(1)
          if j.get('type') != 'service_account' or not j.get('client_email'):
              print('BLAD: brak type=service_account lub client_email')
              sys.exit(1)
          print('OK:', j['client_email'])
          "

      - name: Upload Wyniki to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p Wyniki wyslane 2>/dev/null || true
          python scripts/gdrive_upload_wyniki.py --campaign-dir .
