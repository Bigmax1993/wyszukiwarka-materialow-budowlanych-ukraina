name: GU sobota discovery

on:
  schedule:
    # 18:10 UTC = 20:10 Europe/Warsaw (CEST); zimą (CET) ustaw 19:10 UTC
    - cron: "10 18 * * 6"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  SERPER_DAILY_LIMIT: "1500"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (poprzedni poniedzialek)
        id: prev_run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-fri" and .expired==false) | .workflow_run.id' | head -1)
          if [ -n "$RUN_ID" ]; then
            echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "Kumuluje cache z de-gu-wyniki-fri (run $RUN_ID)"
          else
            echo "Brak poprzedniego artefaktu — pierwszy cykl"
          fi

      - name: Download previous Wyniki (kumulacja cache + Excel)
        if: steps.prev_run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-fri
          github-token: ${{ github.token }}
          run-id: ${{ steps.prev_run.outputs.run-id }}
          path: .

      - name: Discovery (całe Niemcy, serper-only)
        run: python de_gu_bauunternehmen_scraper.py --run-config run_config/mfg_gu_de.json --serper-only-discovery --no-auto-email

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-wed
          path: |
            Wyniki/
            wyslane/
