name: GU discovery

on:
  schedule:
    - cron: "0 17 * * 1"
      timezone: Europe/Warsaw
    - cron: "0 15 * * 2"
      timezone: Europe/Warsaw
    - cron: "0 19 * * 3"
      timezone: Europe/Warsaw
    - cron: "0 20 * * 4"
      timezone: Europe/Warsaw
    - cron: "0 16 * * 5"
      timezone: Europe/Warsaw
  workflow_dispatch:
    inputs:
      discovery_phase:
        description: "Etap discovery: auto (dzien PL) | mon | tue | wed | thu | fri"
        required: false
        type: choice
        options:
          - auto
          - mon
          - tue
          - wed
          - thu
          - fri
        default: auto
      resume_artifact_run_id:
        description: "Wznow z konkretnego run ID (de-gu-wyniki-pi). Puste = wg fazy."
        required: false
        type: string

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  SERPER_DAILY_LIMIT: "1000"
  CLAUDE_UNLIMITED: "1"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (poniedzialek–piatek)
        id: prev_run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESUME_INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.resume_artifact_run_id || '' }}"
          if [ -n "$RESUME_INPUT" ]; then
            echo "run-id=$RESUME_INPUT" >> "$GITHUB_OUTPUT"
            echo "artifact-name=de-gu-wyniki-pi" >> "$GITHUB_OUTPUT"
            echo "resume=1" >> "$GITHUB_OUTPUT"
            echo "phase=manual" >> "$GITHUB_OUTPUT"
            echo "Wznowienie discovery z de-gu-wyniki-pi (run $RESUME_INPUT)"
            exit 0
          fi

          PHASE="${{ github.event_name == 'workflow_dispatch' && inputs.discovery_phase || 'auto' }}"
          if [ "$PHASE" = "auto" ]; then
            DOW=$(TZ=Europe/Warsaw date +%u)
            case "$DOW" in
              1) PHASE=mon ;;
              2) PHASE=tue ;;
              3) PHASE=wed ;;
              4) PHASE=thu ;;
              5) PHASE=fri ;;
              *)
                echo "::warning::Poza pon-pt (DOW=$DOW) — probuje kontynuacje z pi"
                PHASE=thu
                ;;
            esac
          fi
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"
          echo "Faza discovery: $PHASE"

          if [ "$PHASE" = "mon" ]; then
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-fri" and .expired==false) | .workflow_run.id' | head -1)
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
              echo "artifact-name=de-gu-wyniki-fri" >> "$GITHUB_OUTPUT"
              echo "resume=0" >> "$GITHUB_OUTPUT"
              echo "Poniedzialek: nowy tydzien, cache z de-gu-wyniki-fri (run $RUN_ID)"
            else
              echo "Poniedzialek: brak fri — pierwszy cykl (pusty start)"
            fi
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
              --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-pi" and .expired==false) | .workflow_run.id' | head -1)
            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "::error::Brak de-gu-wyniki-pi — uruchom najpierw poniedzialek discovery (faza mon)"
              exit 1
            fi
            echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "artifact-name=de-gu-wyniki-pi" >> "$GITHUB_OUTPUT"
            echo "resume=1" >> "$GITHUB_OUTPUT"
            echo "Kontynuacja ($PHASE) z de-gu-wyniki-pi (run $RUN_ID)"
          fi

      - name: Download previous Wyniki (kumulacja cache + Excel)
        if: steps.prev_run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.prev_run.outputs.artifact-name || 'de-gu-wyniki-fri' }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.prev_run.outputs.run-id }}
          path: .

      - name: Discovery (serper-only, pon-pt)
        run: |
          ARGS="--run-config run_config/mfg_gu_de.json --serper-only-discovery --no-auto-email"
          if [ "${{ steps.prev_run.outputs.resume }}" = "1" ]; then
            ARGS="$ARGS --respect-cache"
            echo "Kontynuacja: --respect-cache"
          else
            echo "Nowy etap tygodnia (poniedzialek lub pierwszy cykl)"
          fi
          python de_gu_bauunternehmen_scraper.py $ARGS

      - name: Upload Wyniki artifact (discovery)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-pi
          path: |
            Wyniki/
            wyslane/
