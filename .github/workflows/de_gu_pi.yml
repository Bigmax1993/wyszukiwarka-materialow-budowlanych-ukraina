name: GU piatek discovery

on:
  schedule:
    # 15:00 UTC = 17:00 Europe/Warsaw (CEST); zimą (CET) ustaw 16:00 UTC
    - cron: "0 15 * * 5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  SERPER_DAILY_LIMIT: "3000"
  CLAUDE_UNLIMITED: "1"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve artifact run (poprzedni wtorek send)
        id: prev_run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate --jq '.artifacts[] | select(.name=="de-gu-wyniki-fri" and .expired==false) | .workflow_run.id' | head -1)
          if [ -n "$RUN_ID" ]; then
            echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "Kumuluje cache z de-gu-wyniki-fri (run $RUN_ID)"
          else
            echo "Brak poprzedniego artefaktu — pierwszy cykl"
          fi

      - name: Download previous Wyniki (kumulacja cache + Excel)
        if: steps.prev_run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-fri
          github-token: ${{ github.token }}
          run-id: ${{ steps.prev_run.outputs.run-id }}
          path: .

      - name: Discovery czesc 1 (piatek, serper-only)
        run: |
          python de_gu_bauunternehmen_scraper.py \
            --run-config run_config/mfg_gu_de.json \
            --serper-only-discovery \
            --no-auto-email

      - name: Upload Wyniki artifact (piatek)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-pi
          path: |
            Wyniki/
            wyslane/
