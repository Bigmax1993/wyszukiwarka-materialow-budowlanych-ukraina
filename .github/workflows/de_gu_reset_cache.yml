name: GU reset pipeline cache

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Resolve latest de-gu-wyniki-fri
        id: prev
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name=="de-gu-wyniki-fri" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')
          echo "run-id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download Wyniki (zachowaj Excel i wyslane)
        if: steps.prev.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-fri
          github-token: ${{ github.token }}
          run-id: ${{ steps.prev.outputs.run-id }}
          path: .

      - name: Wyczyść cache JSON
        run: |
          mkdir -p Wyniki
          python - <<'PY'
          import json
          from pathlib import Path
          from de_gu_bauunternehmen_scraper import reset_pipeline_cache

          p = Path("Wyniki/de_gu_bauunternehmen_cache.json")
          if p.exists():
              before = json.loads(p.read_text(encoding="utf-8"))
              print(
                  "Przed:",
                  {k: (len(v) if isinstance(v, dict) else v) for k, v in before.items()},
              )
          fresh = reset_pipeline_cache()
          p.write_text(json.dumps(fresh, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print("Cache wyczyszczony.")
          PY

      - name: Upload Wyniki artifact
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-fri
          path: |
            Wyniki/
            wyslane/
